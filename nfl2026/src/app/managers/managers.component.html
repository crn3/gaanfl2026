<h1>Managers</h1>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        @for(manager of managers; track manager.id ){
            <tr>
                <td> {{ manager.name }}</td>
            </tr>
        }
    </tbody>
</table>
