<h1>Teams</h1>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Rank</th>
        </tr>
    </thead>
    <tbody>
  @for(team of teams; track team.id ){
    <tr>
      <td>
        <span
          style="display:inline-block; 
          width:8px; 
          height:8px; 
          border-radius:50%;"
          [style.background-color]="'rgb(' + team.r + ',' + team.g + ',' + team.b + ')'"
        ></span>
        {{ team.name }}
      </td>
      <td>{{ team.powerrank }}</td>
    </tr>
  }
</tbody>
</table>
